<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah Dostlarını Ziyaret</title>
    <style>
        :root {
            --bg-color: #E8F5E9; /* Açık yeşil arka plan */
            --sidebar-bg: #C8E6C9; /* Sol menü arka plan */
            --card-bg: #FFFFFF; /* Sağ alan kart beyazı */
            --primary: #2E7D32; /* Ana yeşil ton */
            --primary-hover: #1B5E20; /* Koyu yeşil hover */
            --text-dark: #1B5E20; /* Koyu yeşil metin */
            --border-color: #A5D6A7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--text-dark);
            overflow: hidden;
        }

        /* Başlık ve Gizli Admin Butonu */
        .header-title {
            text-align: center;
            padding: 15px;
            margin: 0;
            background-color: var(--primary);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer; /* Tıklanabilir efekti */
            user-select: none;
        }

        /* Düzen Yapısı */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        #sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border-color);
            height: 100%;
        }

        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .region-group {
            margin-bottom: 20px;
        }

        .region-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-hover);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .saint-item {
            background: #A5D6A7;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .saint-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(5px);
        }

        .saint-item.active {
            background: var(--primary);
            color: white;
            border-left: 5px solid #ffeb3b;
        }

        #main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
        }

        .detail-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: none; /* Başlangıçta gizli */
        }

        .detail-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .detail-name {
            font-size: 2.2rem;
            color: var(--primary-hover);
            margin: 0 0 10px 0;
        }

        .detail-img-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .detail-img {
            max-width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 4px solid var(--border-color);
        }

        .map-btn {
            display: inline-block;
            background: #FF9800;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 25px;
            transition: 0.3s;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .map-btn:hover {
            background: #F57C00;
        }

        .info-section {
            background: #F1F8E9;
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            line-height: 1.6;
            font-size: 1.1rem;
            white-space: pre-wrap; /* Satır sonlarını korur */
        }

        .empty-state {
            text-align: center;
            margin-top: 100px;
            color: var(--primary);
            font-size: 1.5rem;
            opacity: 0.6;
        }

        /* Ortak Modal Yapısı */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: var(--bg-color);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .modal-box.large {
            max-width: 600px;
        }

        .modal-title {
            margin-top: 0;
            color: var(--primary-hover);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .btn-primary, .btn-secondary {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover { background: var(--primary-hover); }

        .btn-secondary {
            background: #9E9E9E;
            color: white;
            margin-top: 10px;
            width: 100%;
        }
        .btn-secondary:hover { background: #757575; }

        .close-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #757575;
        }
        .close-icon:hover { color: red; }

        /* Dosya Yükleme Önizleme */
        #image-preview {
            max-width: 100%;
            height: 150px;
            object-fit: contain;
            margin-top: 10px;
            display: none;
            border: 1px dashed var(--primary);
        }

        /* Özel Uyarı Mesajı (Toast) */
        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-hover);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: bottom 0.4s ease;
            z-index: 2000;
            font-weight: bold;
        }
        #toast.show { bottom: 30px; }
        #toast.error { background: #D32F2F; }

        /* Mobil Uyum */
        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 2px solid var(--border-color); }
            #main-content { height: 60%; padding: 15px; }
            .detail-card { width: 100%; padding: 20px; }
            .detail-img { max-height: 250px; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Sol Menü -->
        <div id="sidebar">
            <!-- Tıklayınca Admin paneli açılacak başlık -->
            <div class="header-title" onclick="openLoginModal()" title="Yönetici paneli için tıklayın">
                ALLAH DOSTLARINI ZİYARET
            </div>
            
            <div class="list-container" id="sidebar-list">
                <!-- Bölgeler ve Kişiler buraya yüklenecek -->
            </div>
        </div>

        <!-- Sağ Detay Alanı -->
        <div id="main-content">
            <div class="empty-state" id="empty-state">
                Detayları görmek için sol taraftaki listeden bir isim seçin.
            </div>

            <div class="detail-card" id="detail-panel">
                <div class="detail-header">
                    <h2 class="detail-name" id="view-name">Mübarek İsmi</h2>
                </div>
                
                <div class="detail-img-container">
                    <img id="view-image" class="detail-img" src="" alt="Fotoğraf">
                </div>

                <a id="view-map" class="map-btn" href="#" target="_blank">📍 Haritada Konumunu Gör</a>

                <div class="info-section" id="view-about">
                    Hakkında bilgiler buraya gelecek...
                </div>
            </div>
        </div>
    </div>

    <!-- Yönetici Giriş Modalı -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-icon" onclick="closeModals()">×</span>
            <h2 class="modal-title">Yönetici Girişi</h2>
            <div class="form-group">
                <label>Şifre:</label>
                <input type="password" id="login-pw" placeholder="Şifreyi giriniz...">
            </div>
            <button class="btn-primary" onclick="checkLogin()">Giriş Yap</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" onclick="showChangePwModal()" style="color: var(--primary); font-size: 0.9rem;">Şifremi Değiştir</a>
            </div>
        </div>
    </div>

    <!-- Şifre Değiştirme Modalı -->
    <div id="change-pw-modal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-icon" onclick="closeModals()">×</span>
            <h2 class="modal-title">Şifre Değiştir</h2>
            <div class="form-group">
                <label>Güvenlik Kodu:</label>
                <input type="text" id="security-code" placeholder="Güvenlik kodunu giriniz...">
            </div>
            <div class="form-group">
                <label>Yeni Şifre:</label>
                <input type="password" id="new-pw" placeholder="Yeni şifrenizi giriniz...">
            </div>
            <button class="btn-primary" onclick="changePassword()">Şifreyi Güncelle</button>
            <button class="btn-secondary" onclick="openLoginModal()">Geri Dön</button>
        </div>
    </div>

    <!-- Yönetici Paneli (Ekleme Formu) Modalı -->
    <div id="admin-panel-modal" class="modal-overlay">
        <div class="modal-box large">
            <span class="close-icon" onclick="closeModals()">×</span>
            <h2 class="modal-title">Yeni Kişi Ekle</h2>
            
            <div class="form-group">
                <label>Bölge Adı (Örn: İstanbul):</label>
                <input type="text" id="input-region" placeholder="Listede görünecek bölge grubu...">
            </div>
            
            <div class="form-group">
                <label>Mübareğin İsmi:</label>
                <input type="text" id="input-name" placeholder="İsim...">
            </div>

            <div class="form-group">
                <label>Harita Linki (Google Maps Embed/Paylaşım Linki):</label>
                <input type="text" id="input-map" placeholder="https://maps.app.goo.gl/...">
            </div>

            <div class="form-group">
                <label>Resim Yükle:</label>
                <input type="file" id="input-image" accept="image/*" onchange="handleImageUpload(event)">
                <img id="image-preview" src="">
            </div>

            <div class="form-group">
                <label>Kişisel / Tarihi Bilgiler:</label>
                <textarea id="input-about" placeholder="Mübarek hakkında bilinmesi gerekenler..."></textarea>
            </div>

            <button class="btn-primary" onclick="saveData()">KAYDET</button>
        </div>
    </div>

    <!-- Özel Uyarı Mesaj Kutusu -->
    <div id="toast">Bildirim Mesajı</div>

    <script type="module">
        // Firebase Modüllerini İçe Aktarma
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Değişkenler
        window.saintsList = []; // Tüm veriyi tutacak liste
        window.currentPassword = "2468"; // Varsayılan Şifre
        const SECURITY_CODE = "İLKİKRA"; // Güvenlik Kodu
        window.imageBase64 = null; // Yüklenen resmi tutmak için
        
        let app, db, auth;
        let isLocalMode = false;
        let appId = "allah-dostlari-default";
        let userId = null;

        // Firebase Ayarları Çekme (Eğer Sistemdeysek)
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        if (typeof __app_id !== 'undefined') appId = __app_id;

        window.onload = async () => {
            if (!firebaseConfigStr) {
                // Masaüstü (Yerel) Modda Çalışma Durumu
                isLocalMode = true;
                showToast("Masaüstü Modu: Veriler sadece bu oturum için geçerlidir.");
                renderSidebar();
            } else {
                // Firebase (Bulut) Modunda Çalışma Durumu
                try {
                    const firebaseConfig = JSON.parse(firebaseConfigStr);
                    app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    
                    if (initialAuthToken) {
                        await signInWithCustomToken(auth, initialAuthToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                    
                    userId = auth.currentUser.uid;
                    loadFromFirebase();
                    loadPasswordFromFirebase();

                } catch (error) {
                    console.error("Firebase Başlatma Hatası:", error);
                    isLocalMode = true;
                    showToast("Bağlantı sağlanamadı, Çevrimdışı moda geçildi.", true);
                }
            }
        };

        window.showToast = (msg, isError = false) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = isError ? 'error show' : 'show';
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        };

        window.openLoginModal = () => { 
            closeModals(); 
            document.getElementById('login-modal').style.display = 'flex'; 
            document.getElementById('login-pw').value = '';
        };
        
        window.showChangePwModal = () => {
            closeModals();
            document.getElementById('change-pw-modal').style.display = 'flex';
            document.getElementById('security-code').value = '';
            document.getElementById('new-pw').value = '';
        };

        window.closeModals = () => {
            const modals = document.querySelectorAll('.modal-overlay');
            modals.forEach(m => m.style.display = 'none');
        };

        window.checkLogin = () => {
            const pw = document.getElementById('login-pw').value;
            if (pw === window.currentPassword) {
                closeModals();
                document.getElementById('admin-panel-modal').style.display = 'flex';
                resetAdminForm();
                showToast("Yönetici paneline giriş yapıldı.");
            } else {
                showToast("Hatalı Şifre!", true);
            }
        };

        window.changePassword = async () => {
            const code = document.getElementById('security-code').value;
            const newPw = document.getElementById('new-pw').value;

            if (code !== SECURITY_CODE) {
                showToast("Güvenlik kodu hatalı!", true);
                return;
            }
            if (newPw.length < 4) {
                showToast("Şifre en az 4 haneli olmalıdır!", true);
                return;
            }

            window.currentPassword = newPw;

            if (!isLocalMode && db) {
                // Şifreyi buluta kaydet (ayarlar belgesi içine)
                try {
                    const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin');
                    await setDoc(settingsRef, { password: newPw });
                    showToast("Şifre kalıcı olarak değiştirildi!");
                } catch (e) {
                    console.error("Şifre kayıt hatası:", e);
                    showToast("Sadece bu oturum için değiştirildi.");
                }
            } else {
                showToast("Şifre geçici olarak değiştirildi!");
            }
            openLoginModal();
        };

        async function loadPasswordFromFirebase() {
            try {
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin');
                const docSnap = await getDoc(settingsRef);
                if (docSnap.exists()) {
                    window.currentPassword = docSnap.data().password;
                }
            } catch (e) { console.log("Şifre okunamadı, varsayılan kullanılacak."); }
        }

        window.handleImageUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Fotoğrafı boyutunu küçültmek ve Base64 yapmak için Canvas kullanımı
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height && width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width; width = MAX_WIDTH;
                    } else if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height; height = MAX_HEIGHT;
                    }

                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // %70 kalite ile JPEG formatında sıkıştır
                    window.imageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const preview = document.getElementById('image-preview');
                    preview.src = window.imageBase64;
                    preview.style.display = 'block';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        };

        window.resetAdminForm = () => {
            document.getElementById('input-region').value = '';
            document.getElementById('input-name').value = '';
            document.getElementById('input-map').value = '';
            document.getElementById('input-about').value = '';
            document.getElementById('input-image').value = '';
            document.getElementById('image-preview').style.display = 'none';
            window.imageBase64 = null;
        };

        window.saveData = async () => {
            const region = document.getElementById('input-region').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const mapLink = document.getElementById('input-map').value.trim();
            const about = document.getElementById('input-about').value.trim();

            if (!region || !name) {
                showToast("Bölge ve İsim zorunludur!", true);
                return;
            }

            const newPerson = {
                region: region,
                name: name,
                mapLink: mapLink,
                about: about,
                image: window.imageBase64,
                timestamp: Date.now()
            };

            if (isLocalMode) {
                // Masaüstü çalışması
                window.saintsList.push({ id: Date.now().toString(), ...newPerson });
                showToast("Başarıyla eklendi (Geçici)!");
                closeModals();
                renderSidebar();
            } else {
                // Firebase (Bulut) Kaydı
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'saintsList');
                    await addDoc(colRef, newPerson);
                    showToast("Buluta başarıyla kaydedildi!");
                    closeModals();
                } catch (e) {
                    console.error("Kayıt Hatası:", e);
                    showToast("Kayıt yapılamadı!", true);
                }
            }
        };

        function loadFromFirebase() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'saintsList');
            
            // Veritabanını anlık dinleme
            onSnapshot(colRef, (snapshot) => {
                window.saintsList = [];
                snapshot.forEach(doc => {
                    window.saintsList.push({ id: doc.id, ...doc.data() });
                });
                renderSidebar();
            }, (error) => {
                console.error("Veri Çekme Hatası:", error);
                showToast("Veriler yüklenemedi", true);
            });
        }

        function renderSidebar() {
            const listDiv = document.getElementById('sidebar-list');
            listDiv.innerHTML = '';

            if (window.saintsList.length === 0) {
                listDiv.innerHTML = '<div style="padding:10px; color:#555;">Henüz kayıt bulunmamaktadır. Yönetici panelinden ekleyin.</div>';
                return;
            }

            // Verileri Bölgelere Göre Grupla
            const groups = {};
            window.saintsList.forEach(person => {
                const reg = person.region || "Diğer";
                if (!groups[reg]) groups[reg] = [];
                groups[reg].push(person);
            });

            // Grupları Ekrana Bas
            for (const [regionName, people] of Object.entries(groups)) {
                // Bölge Başlığı
                const regionDiv = document.createElement('div');
                regionDiv.className = 'region-group';
                
                const title = document.createElement('div');
                title.className = 'region-title';
                title.innerText = regionName;
                regionDiv.appendChild(title);

                // O bölgedeki isimler
                people.forEach(person => {
                    const item = document.createElement('div');
                    item.className = 'saint-item';
                    item.innerText = person.name;
                    item.onclick = () => showDetails(person, item);
                    regionDiv.appendChild(item);
                });

                listDiv.appendChild(regionDiv);
            }
        }

        // Seçili Kişiyi Sağ Tarafta Göster
        window.showDetails = (person, element) => {
            // Aktif efekti
            document.querySelectorAll('.saint-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');

            // Paneli Göster
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('detail-panel').style.display = 'block';

            // Verileri Yerleştir
            document.getElementById('view-name').innerText = person.name;
            
            const imgEl = document.getElementById('view-image');
            if (person.image) {
                imgEl.src = person.image;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }

            const mapBtn = document.getElementById('view-map');
            if (person.mapLink) {
                mapBtn.href = person.mapLink;
                mapBtn.style.display = 'inline-block';
            } else {
                mapBtn.style.display = 'none';
            }

            document.getElementById('view-about').innerText = person.about || "Bu kişi hakkında henüz bilgi girilmemiş.";
        };
    </script>
</body>
</html>
