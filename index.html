<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah Dostları Ziyaret Listesi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        /* Kaydırma Çubuğu Tasarımı */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #059669; }

        /* Modal Animasyonu */
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(4px); } }

        /* Kart Seçim Efekti */
        .card-active { border-left: 6px solid #10b981; background: #064e3b; }
        
        .hide { display: none !important; }
    </style>
</head>
<body class="bg-emerald-50 flex h-screen overflow-hidden text-slate-800">

    <aside class="w-full md:w-96 bg-emerald-900 text-white flex flex-col shadow-2xl z-20 shrink-0">
        <!-- Başlık ve Yönetici Girişi -->
        <div class="p-6 border-b border-emerald-700 text-center cursor-pointer hover:bg-emerald-800 transition-colors group" onclick="openLogin()">
            <h1 class="text-xl font-bold tracking-widest text-emerald-300 group-hover:text-white transition-colors">
                ALLAH DOSTLARINI
            </h1>
            <h2 class="text-sm font-light tracking-[0.2em] text-emerald-100/70 mt-1">ZİYARET LİSTESİ</h2>
            <div class="mt-2 text-xs text-emerald-500/50 group-hover:text-emerald-400">
                <span id="admin-status-text">Yönetici girişi için tıklayın</span>
            </div>
        </div>

        <!-- Yönetici Araçları (Giriş yapılınca görünür) -->
        <div id="admin-tools" class="hidden p-4 border-b border-emerald-700 bg-emerald-950/50">
            <button onclick="createNew()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                YENİ KİŞİ EKLE
            </button>
        </div>

        <!-- Kişi Listesi -->
        <div id="list-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
            <!-- Kartlar buraya JavaScript ile eklenecek -->
        </div>
    </aside>

    <main class="flex-1 relative overflow-y-auto h-screen">
        
        <!-- Boş Durum Ekranı -->
        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-emerald-800/40">
            <svg class="w-32 h-32 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <h2 class="text-2xl font-light">Lütfen soldan bir kişi seçin</h2>
        </div>

        <!-- Görüntüleme Ekranı (Normal Kullanıcılar İçin) -->
        <div id="view-mode" class="hidden max-w-4xl mx-auto p-8 pb-24">
            <!-- Yönetici ise Düzenle Butonu -->
            <div id="edit-btn-container" class="hidden flex justify-end mb-4">
                <button onclick="editCurrent()" class="bg-amber-500 hover:bg-amber-400 text-white px-6 py-2 rounded-lg font-bold shadow-md transition-all">
                    ✎ Düzenle
                </button>
            </div>

            <!-- Albüm -->
            <div id="view-album" class="flex gap-4 overflow-x-auto pb-4 snap-x mb-8">
                <!-- Resimler Buraya -->
            </div>

            <div class="bg-white rounded-3xl shadow-xl p-8 border border-emerald-100">
                <h1 id="view-name" class="text-4xl font-bold text-emerald-900 mb-2">İsim</h1>
                <div class="flex gap-4 text-emerald-600 font-medium mb-6 pb-6 border-b border-emerald-50">
                    <span id="view-birth">Doğum: -</span>
                    <span>|</span>
                    <span id="view-death">Vefat: -</span>
                </div>
                
                <h3 class="text-lg font-bold text-emerald-800 mb-2">Hakkında</h3>
                <p id="view-about" class="text-slate-600 leading-relaxed whitespace-pre-wrap mb-8">Bilgi yok...</p>

                <h3 class="text-lg font-bold text-emerald-800 mb-2">Harita / Konum</h3>
                <a id="view-map" href="#" target="_blank" class="inline-flex items-center gap-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl font-medium transition-colors">
                    📍 Haritada Görüntüle
                </a>
            </div>
        </div>

        <div id="edit-mode" class="hidden max-w-4xl mx-auto p-8 pb-32">
            <div class="bg-white rounded-3xl shadow-2xl p-8 border-2 border-emerald-200">
                <div class="flex justify-between items-center mb-8 border-b pb-4">
                    <h2 class="text-2xl font-bold text-emerald-800" id="form-title">Yeni Kişi Ekle / Düzenle</h2>
                    <button onclick="cancelEdit()" class="text-slate-400 hover:text-red-500">İptal ✖</button>
                </div>

                <div class="space-y-6">
                    <!-- 1. Harita -->
                    <div>
                        <label class="block text-sm font-bold text-emerald-800 mb-2">📍 Harita Linki</label>
                        <input type="text" id="edit-map" placeholder="Google Maps Linki yapıştırın..." class="w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>

                    <!-- 2. Resim Albümü -->
                    <div class="bg-emerald-50 p-6 rounded-xl border border-emerald-100">
                        <label class="block text-sm font-bold text-emerald-800 mb-2">📸 Resim Albümü</label>
                        
                        <div class="flex flex-wrap gap-4 mb-4" id="edit-album-preview">
                            <!-- Yüklenen resimler burada görünecek -->
                        </div>

                        <div class="flex gap-2">
                            <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                            <button onclick="document.getElementById('image-upload').click()" class="bg-white border-2 border-dashed border-emerald-400 text-emerald-600 hover:bg-emerald-100 px-6 py-3 rounded-xl font-medium transition-colors">
                                + Bilgisayardan Resim Seç
                            </button>
                        </div>
                    </div>

                    <!-- 3. İsim -->
                    <div>
                        <label class="block text-sm font-bold text-emerald-800 mb-2">Mübareğin İsmi</label>
                        <input type="text" id="edit-name" placeholder="Örn: Mahmud Efendi Hz." class="w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>

                    <!-- 4. Tarihler -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-emerald-800 mb-2">Doğum Yılı / Tarihi</label>
                            <input type="text" id="edit-birth" placeholder="Örn: 1929" class="w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-emerald-800 mb-2">Vefat Yılı / Tarihi</label>
                            <input type="text" id="edit-death" placeholder="Örn: 2022" class="w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- 5. Bilgi -->
                    <div>
                        <label class="block text-sm font-bold text-emerald-800 mb-2">Hakkında / Kişisel Bilgiler</label>
                        <textarea id="edit-about" rows="6" placeholder="Detaylı bilgileri buraya yazın..." class="w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                    </div>

                    <!-- 6. KOCAMAN KAYDET BUTONU -->
                    <button onclick="saveData()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xl py-6 rounded-2xl shadow-[0_10px_20px_rgba(16,185,129,0.3)] hover:shadow-[0_15px_25px_rgba(16,185,129,0.4)] transition-all transform hover:-translate-y-1">
                        💾 BİLGİLERİ KAYDET
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="hidden modal-enter fixed inset-0 z-50 bg-emerald-950/80 items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden relative">
            <button onclick="closeLogin()" class="absolute top-4 right-4 text-slate-400 hover:text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div class="bg-emerald-800 p-6 text-center border-b-4 border-emerald-500">
                <h2 class="text-2xl font-bold text-white">Yönetici Girişi</h2>
            </div>
            <div class="p-8 space-y-6 bg-emerald-50">
                <div>
                    <label class="block text-sm font-bold text-emerald-900 mb-2 text-center">Şifre (2468)</label>
                    <input type="password" id="login-pw" placeholder="••••" class="w-full px-4 py-4 rounded-xl border-2 border-emerald-200 focus:border-emerald-500 text-center text-2xl tracking-widest outline-none">
                </div>
                <button onclick="checkLogin()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all text-lg">GİRİŞ YAP</button>
            </div>
        </div>
    </div>

    <script>
        // --- DURUM YÖNETİMİ ---
        let isAdmin = false;
        let dostlar = JSON.parse(localStorage.getItem('allahDostlariData')) || [];
        let currentEditingId = null;
        let currentEditImages = []; // Düzenlenen kişinin albümü
        let currentlyViewingId = null;

        // --- SAYFA YÜKLENDİĞİNDE ---
        window.onload = () => {
            renderList();
            showPanel('empty-state');
        };

        // --- YÖNETİCİ GİRİŞİ ---
        function openLogin() {
            if(isAdmin) {
                if(confirm("Yönetici çıkışı yapmak istiyor musunuz?")) {
                    isAdmin = false;
                    document.getElementById('admin-tools').classList.add('hidden');
                    document.getElementById('edit-btn-container').classList.add('hidden');
                    document.getElementById('admin-status-text').innerText = "Yönetici girişi için tıklayın";
                    showPanel('empty-state');
                    renderList();
                }
                return;
            }
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('login-modal').classList.add('flex');
            document.getElementById('login-pw').value = '';
            document.getElementById('login-pw').focus();
        }

        function closeLogin() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('login-modal').classList.remove('flex');
        }

        function checkLogin() {
            if(document.getElementById('login-pw').value === '2468') {
                isAdmin = true;
                closeLogin();
                document.getElementById('admin-tools').classList.remove('hidden');
                document.getElementById('admin-status-text').innerText = "Yönetici (Çıkış yapmak için tıklayın)";
                if(currentlyViewingId) document.getElementById('edit-btn-container').classList.remove('hidden');
                alert("Giriş Başarılı! Artık kişi ekleyebilir ve silebilirsiniz.");
            } else {
                alert("Hatalı Şifre!");
            }
        }

        // --- PANELLER ARASI GEÇİŞ ---
        function showPanel(panelId) {
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('view-mode').classList.add('hidden');
            document.getElementById('edit-mode').classList.add('hidden');
            document.getElementById(panelId).classList.remove('hidden');
        }

        // --- LİSTE OLUŞTURMA ---
        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            if (dostlar.length === 0) {
                container.innerHTML = `<p class="text-center text-emerald-300/50 mt-4 text-sm">Liste boş.</p>`;
                return;
            }

            dostlar.forEach(kisi => {
                const isSelected = currentlyViewingId === kisi.id;
                // Kart resmi (Albümde resim varsa ilkini, yoksa varsayılanı göster)
                const mainImage = kisi.images && kisi.images.length > 0 ? kisi.images[0] : 'https://placehold.co/100x100/10b981/ffffff?text=Resim+Yok';

                const card = document.createElement('div');
                card.className = `bg-emerald-800/50 hover:bg-emerald-700/80 p-3 rounded-xl cursor-pointer transition-all flex items-center gap-4 ${isSelected ? 'card-active' : ''}`;
                card.onclick = () => viewPerson(kisi.id);

                card.innerHTML = `
                    <img src="${mainImage}" class="w-16 h-16 rounded-lg object-cover shadow-md shrink-0 border border-emerald-600">
                    <div class="flex-1 overflow-hidden">
                        <h3 class="text-white font-bold truncate">${kisi.name}</h3>
                        <p class="text-emerald-300 text-xs truncate">${kisi.birth || '?'} - ${kisi.death || '?'}</p>
                    </div>
                    ${isAdmin ? `<button onclick="deletePerson('${kisi.id}', event)" class="text-red-400 hover:text-red-300 p-2">🗑</button>` : ''}
                `;
                container.appendChild(card);
            });
        }

        // --- KİŞİ GÖRÜNTÜLEME ---
        function viewPerson(id) {
            const kisi = dostlar.find(d => d.id === id);
            if(!kisi) return;

            currentlyViewingId = id;
            renderList(); // Seçili kartı vurgulamak için

            document.getElementById('view-name').innerText = kisi.name;
            document.getElementById('view-birth').innerText = `Doğum: ${kisi.birth || '-'}`;
            document.getElementById('view-death').innerText = `Vefat: ${kisi.death || '-'}`;
            document.getElementById('view-about').innerText = kisi.about || 'Bilgi girilmemiş.';
            
            const mapBtn = document.getElementById('view-map');
            if(kisi.map) {
                mapBtn.href = kisi.map;
                mapBtn.classList.remove('hidden');
                mapBtn.classList.add('inline-flex');
            } else {
                mapBtn.classList.add('hidden');
                mapBtn.classList.remove('inline-flex');
            }

            // Albümü Doldur
            const albumContainer = document.getElementById('view-album');
            albumContainer.innerHTML = '';
            if(kisi.images && kisi.images.length > 0) {
                kisi.images.forEach(imgData => {
                    const img = document.createElement('img');
                    img.src = imgData;
                    img.className = "w-64 h-64 object-cover rounded-2xl shadow-lg snap-center shrink-0 border border-emerald-100";
                    albumContainer.appendChild(img);
                });
            } else {
                albumContainer.innerHTML = `<div class="w-full h-32 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500/50">Bu kişiye ait resim bulunamadı.</div>`;
            }

            // Yöneticiyse düzenle butonunu göster
            document.getElementById('edit-btn-container').className = isAdmin ? 'flex justify-end mb-4' : 'hidden';

            showPanel('view-mode');
        }

        // --- YENİ KİŞİ EKLEME & DÜZENLEME ---
        function createNew() {
            currentEditingId = null;
            currentEditImages = [];
            
            document.getElementById('form-title').innerText = "Yeni Allah Dostu Ekle";
            document.getElementById('edit-name').value = '';
            document.getElementById('edit-map').value = '';
            document.getElementById('edit-birth').value = '';
            document.getElementById('edit-death').value = '';
            document.getElementById('edit-about').value = '';
            
            renderEditAlbumPreview();
            showPanel('edit-mode');
        }

        function editCurrent() {
            if(!currentlyViewingId) return;
            const kisi = dostlar.find(d => d.id === currentlyViewingId);
            if(!kisi) return;

            currentEditingId = kisi.id;
            currentEditImages = [...(kisi.images || [])];

            document.getElementById('form-title').innerText = "Bilgileri Düzenle";
            document.getElementById('edit-name').value = kisi.name || '';
            document.getElementById('edit-map').value = kisi.map || '';
            document.getElementById('edit-birth').value = kisi.birth || '';
            document.getElementById('edit-death').value = kisi.death || '';
            document.getElementById('edit-about').value = kisi.about || '';
            
            renderEditAlbumPreview();
            showPanel('edit-mode');
        }

        function cancelEdit() {
            if(currentlyViewingId) {
                showPanel('view-mode');
            } else {
                showPanel('empty-state');
            }
        }

        // --- RESİM YÜKLEME (Base64 Mantığı) ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentEditImages.push(e.target.result); // Resmi diziye ekle
                renderEditAlbumPreview();
            };
            reader.readAsDataURL(file); // Bilgisayardaki resmi veri formatına çevir
            event.target.value = ''; // Inputu sıfırla
        }

        function removeImage(index) {
            currentEditImages.splice(index, 1);
            renderEditAlbumPreview();
        }

        function renderEditAlbumPreview() {
            const container = document.getElementById('edit-album-preview');
            container.innerHTML = '';
            
            currentEditImages.forEach((imgData, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = "relative w-24 h-24 rounded-lg overflow-hidden border-2 border-emerald-200 shadow-sm";
                
                const img = document.createElement('img');
                img.src = imgData;
                img.className = "w-full h-full object-cover";
                
                const delBtn = document.createElement('button');
                delBtn.innerHTML = "✖";
                delBtn.className = "absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center shadow hover:bg-red-600";
                delBtn.onclick = () => removeImage(index);

                wrapper.appendChild(img);
                wrapper.appendChild(delBtn);
                container.appendChild(wrapper);
            });
        }

        // --- VERİYİ KAYDETME ---
        function saveData() {
            const nameInput = document.getElementById('edit-name').value.trim();
            if(!nameInput) {
                alert("Lütfen bir isim giriniz!");
                document.getElementById('edit-name').focus();
                return;
            }

            const newData = {
                id: currentEditingId || Date.now().toString(), // Yeni ekleniyorsa eşsiz ID oluştur
                name: nameInput,
                map: document.getElementById('edit-map').value.trim(),
                birth: document.getElementById('edit-birth').value.trim(),
                death: document.getElementById('edit-death').value.trim(),
                about: document.getElementById('edit-about').value.trim(),
                images: currentEditImages
            };

            if(currentEditingId) {
                // Düzenleme yapılıyorsa bul ve değiştir
                const index = dostlar.findIndex(d => d.id === currentEditingId);
                if(index !== -1) dostlar[index] = newData;
            } else {
                // Yeni ekleniyorsa listeye ekle
                dostlar.push(newData);
            }

            // Tarayıcı hafızasına kaydet (Masaüstünde sorunsuz çalışır)
            try {
                localStorage.setItem('allahDostlariData', JSON.stringify(dostlar));
                alert("Bilgiler başarıyla kaydedildi!");
                
                renderList();
                viewPerson(newData.id); // Kaydettikten sonra kişiyi görüntüle
            } catch (e) {
                alert("Hata: Resimler çok büyük olabilir. Lütfen daha küçük boyutlu resimler seçin veya gereksizleri silin. Tarayıcı hafızası doldu.");
            }
        }

        // --- KİŞİ SİLME ---
        function deletePerson(id, event) {
            event.stopPropagation(); // Kartın tıklanmasını engelle
            if(confirm("Bu kişiyi silmek istediğinize emin misiniz?")) {
                dostlar = dostlar.filter(d => d.id !== id);
                localStorage.setItem('allahDostlariData', JSON.stringify(dostlar));
                
                if(currentlyViewingId === id) {
                    currentlyViewingId = null;
                    showPanel('empty-state');
                }
                renderList();
            }
        }
    </script>
</body>
</html>
