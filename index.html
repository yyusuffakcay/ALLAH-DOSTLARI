<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allah Dostlarını Ziyaret</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#114232',    /* Koyu Zümrüt Yeşili */
                        secondary: '#87A922',  /* Altın Yeşili */
                        surface: '#F7F9F2',    /* Açık Krem Arka Plan */
                        card: '#FFFFFF',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #F7F9F2; }
        
        /* İnce Kaydırma Çubukları */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #sidebar-list::-webkit-scrollbar-thumb { background: #2a614d; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modal Animasyonu */
        .modal-container { display: none; }
        .modal-container.active { display: flex; animation: fadeInModal 0.2s ease-out forwards; }
        @keyframes fadeInModal { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(4px); } }
        
        /* Albüm Kaydırma Alanı */
        .gallery-scroll { scroll-behavior: smooth; }
        .gallery-scroll::-webkit-scrollbar { height: 8px; }
        
        /* Toast Bildirimi */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999;
        }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body class="flex h-screen w-full text-slate-800 antialiased">

    <aside class="w-full md:w-80 bg-primary text-white flex flex-col shadow-2xl relative z-20 flex-shrink-0 transition-all duration-300">
        <!-- Yönetici Girişi İçin Başlık -->
        <div onclick="openLoginModal()" class="p-6 cursor-pointer hover:bg-white/5 transition-colors border-b border-white/10 text-center" title="Yönetici girişi için tıklayın">
            <h1 class="text-xl font-bold tracking-widest text-secondary">ALLAH DOSTLARINI</h1>
            <h2 class="text-sm font-light tracking-[0.2em] text-white/70 mt-1">ZİYARET LİSTESİ</h2>
        </div>

        <!-- Yönetici Araçları (Giriş yapılınca görünür) -->
        <div id="admin-tools" class="hidden p-4 border-b border-white/10 bg-black/20">
            <button onclick="openNewEntryForm()" class="w-full bg-secondary hover:bg-[#72901c] text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                YENİ KİŞİ EKLE
            </button>
        </div>

        <!-- Kartvizit Listesi -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4" id="sidebar-list">
            <div class="text-center text-white/50 text-sm mt-10">Yükleniyor...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-surface relative">
        
        <!-- Boş Durum -->
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-center p-8 fade-in">
            <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mb-6">
                <svg class="w-12 h-12 text-primary/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <h3 class="text-2xl font-bold text-primary mb-2">Seçim Yapınız</h3>
            <p class="text-slate-500 max-w-md">Kayıtları görmek için sol taraftaki kartlardan birine tıklayın.</p>
        </div>

        <div id="main-panel" class="hidden flex-1 overflow-y-auto fade-in p-4 md:p-8">
            <div class="max-w-4xl mx-auto space-y-6 pb-20">
                
                <!-- YÖNETİCİ MODU: Üst Bilgi Barı -->
                <div id="edit-header" class="hidden flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <span class="font-bold text-primary flex items-center gap-2">
                        <svg class="w-5 h-5 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        Düzenleme Modu Aktif
                    </span>
                    <button onclick="cancelEdit()" class="text-slate-400 hover:text-red-500 font-medium text-sm transition-colors">İptal Et</button>
                </div>

                <!-- 1. HARİTA BÖLÜMÜ -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <!-- Okuma Modu -->
                    <div id="view-map-container" class="hidden">
                        <a id="view-map" href="#" target="_blank" class="w-full inline-flex items-center justify-center px-8 py-4 bg-secondary hover:bg-[#72901c] text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-1">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            Haritada Konumunu Gör
                        </a>
                    </div>
                    <!-- Düzenleme Modu -->
                    <div id="edit-map-container" class="hidden">
                        <label class="block text-sm font-bold text-slate-700 mb-2">📍 Harita Linki (Google Maps)</label>
                        <input type="text" id="input-map" placeholder="https://maps.app.goo.gl/..." class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-secondary outline-none transition-all">
                    </div>
                </div>

                <!-- 2. RESİM ALBÜMÜ BÖLÜMÜ -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <label class="block text-sm font-bold text-slate-700 mb-4">📸 Resim Albümü</label>
                    
                    <!-- Albüm Scroll Alanı -->
                    <div class="flex gap-4 overflow-x-auto gallery-scroll pb-4 items-center" id="gallery-container">
                        <!-- JS ile resimler buraya dizilecek -->
                    </div>

                    <!-- Düzenleme Modu: Resim Ekle Butonu -->
                    <div id="edit-gallery-controls" class="hidden mt-4 pt-4 border-t border-slate-100">
                        <label class="cursor-pointer inline-flex items-center justify-center w-full sm:w-auto px-6 py-3 bg-primary/10 hover:bg-primary/20 text-primary font-bold rounded-xl transition-colors border border-primary/20">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            Yeni Resim Ekle
                            <input type="file" multiple accept="image/*" onchange="handleGalleryUpload(event)" class="hidden">
                        </label>
                        <p class="text-xs text-slate-400 mt-2">Birden fazla resim seçebilirsiniz. Resimler otomatik sıkıştırılır.</p>
                    </div>
                </div>

                <!-- 3. İSİM BÖLÜMÜ -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <!-- Okuma Modu -->
                    <h1 id="view-name" class="hidden text-3xl md:text-4xl font-bold text-primary text-center">İsim</h1>
                    <!-- Düzenleme Modu -->
                    <div id="edit-name-container" class="hidden">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Mübareğin İsmi Soyismi / Lakabı</label>
                        <input type="text" id="input-name" placeholder="Örn: Mahmud Efendi Hz." class="w-full px-4 py-3 rounded-xl text-xl font-bold border border-slate-300 focus:ring-2 focus:ring-secondary outline-none transition-all text-center">
                    </div>
                </div>

                <!-- 4. DOĞUM VE ÖLÜM TARİHİ BÖLÜMÜ -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <!-- Okuma Modu -->
                    <div id="view-dates-container" class="hidden flex justify-center items-center gap-4 text-lg font-medium text-slate-600">
                        <span id="view-birth">?</span>
                        <span class="text-slate-300">-</span>
                        <span id="view-death">?</span>
                    </div>
                    <!-- Düzenleme Modu -->
                    <div id="edit-dates-container" class="hidden grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Doğum Yılı / Tarihi</label>
                            <input type="text" id="input-birth" placeholder="Örn: 1929" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-secondary outline-none transition-all text-center">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Ölüm Yılı / Tarihi</label>
                            <input type="text" id="input-death" placeholder="Örn: 2022" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-secondary outline-none transition-all text-center">
                        </div>
                    </div>
                </div>

                <!-- 5. KİŞİSEL BİLGİ BÖLÜMÜ -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <label class="block text-sm font-bold text-slate-700 mb-4 border-b border-slate-100 pb-2">Kişisel Bilgiler / Hakkında</label>
                    
                    <!-- Okuma Modu -->
                    <p id="view-about" class="hidden text-slate-700 leading-relaxed whitespace-pre-wrap font-medium">Bilgi yok.</p>
                    
                    <!-- Düzenleme Modu -->
                    <div id="edit-about-container" class="hidden">
                        <textarea id="input-about" placeholder="Hayatı, eserleri, bilinmesi gerekenler..." class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-secondary outline-none transition-all h-48 resize-y"></textarea>
                    </div>
                </div>

                <!-- 6. KAYDET BUTONU (SADECE DÜZENLEME MODUNDA) -->
                <div id="save-button-container" class="hidden pb-10">
                    <button onclick="saveData()" class="w-full bg-primary hover:bg-[#0a2e22] text-white text-xl font-bold py-5 px-4 rounded-2xl shadow-xl transition-all transform active:scale-95 flex justify-center items-center gap-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                        TÜM BİLGİLERİ KAYDET
                    </button>
                </div>

                <!-- Admin için Düzenle Butonu (Okuma Modundayken Gösterilir) -->
                <div id="trigger-edit-container" class="hidden pb-10">
                    <button onclick="switchToEditMode()" class="w-full bg-secondary hover:bg-[#72901c] text-white text-lg font-bold py-4 px-4 rounded-xl shadow-md transition-all flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        Bu Kaydı Düzenle
                    </button>
                </div>

            </div>
        </div>
    </main>

    <div id="login-modal" class="modal-container fixed inset-0 z-50 bg-primary/80 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden relative transform scale-95 transition-transform duration-200" id="login-box">
            <button onclick="closeModals()" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div class="bg-primary p-6 text-center">
                <h2 class="text-2xl font-bold text-white">Yönetici Girişi</h2>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Şifre</label>
                    <input type="password" id="login-pw" placeholder="••••" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-secondary text-center text-xl tracking-widest outline-none">
                </div>
                <button onclick="checkLogin()" class="w-full bg-primary hover:bg-[#0a2e22] text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all active:scale-95">GİRİŞ YAP</button>
            </div>
        </div>
    </div>

    <!-- Bildirim -->
    <div id="toast" class="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl font-medium flex items-center gap-3">
        <span id="toast-icon">ℹ️</span>
        <span id="toast-msg">Bildirim</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Değişkenler
        window.saintsList = [];
        window.isAdmin = false;
        window.currentPassword = "2468";
        window.currentEditingId = null; // null ise yeni kayıt, dolu ise güncelleme
        window.currentImages = []; // Aktif kaydın resimleri
        
        let app, db, auth;
        let isLocalMode = false;
        let appId = "allah-dostlari-default";

        // Toast
        window.showToast = (msg, type = 'success') => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.className = `bg-${type === 'error' ? 'red-600' : 'secondary'} text-white px-6 py-3 rounded-full shadow-2xl font-medium flex items-center gap-3 show`;
            document.getElementById('toast-icon').innerText = type === 'error' ? '⚠️' : '✅';
            setTimeout(() => toast.classList.remove('show'), 3500);
        };

        // Modallar
        window.openLoginModal = () => { 
            if(window.isAdmin) { showToast("Zaten giriş yaptınız.", 'success'); return; }
            document.getElementById('login-modal').classList.add('active'); 
            setTimeout(() => document.getElementById('login-box').style.transform = 'scale(1)', 10);
            document.getElementById('login-pw').value = '';
            document.getElementById('login-pw').focus();
        };
        window.closeModals = () => {
            document.querySelectorAll('.modal-container').forEach(m => {
                m.classList.remove('active');
                const box = m.querySelector('div');
                if(box) box.style.transform = 'scale(0.95)';
            });
        };

        window.checkLogin = () => {
            const pw = document.getElementById('login-pw').value;
            if (pw === window.currentPassword) {
                window.isAdmin = true;
                closeModals();
                document.getElementById('admin-tools').classList.remove('hidden');
                showToast("Yönetici girişi başarılı!");
                renderSidebar(); // Listeyi yenile (Admin araçları eklenebilir)
                
                // Eğer ekranda bir kayıt açıksa, "Düzenle" butonunu göster
                if(window.currentEditingId && document.getElementById('view-name-container')?.classList.contains('hidden') === false) {
                    document.getElementById('trigger-edit-container').classList.remove('hidden');
                }
            } else {
                showToast("Hatalı Şifre!", 'error');
            }
        };

        // UI Durum Değiştiriciler
        window.setUIMode = (mode) => {
            const viewEls = ['view-map-container', 'view-name', 'view-dates-container', 'view-about'];
            const editEls = ['edit-map-container', 'edit-gallery-controls', 'edit-name-container', 'edit-dates-container', 'edit-about-container', 'save-button-container'];
            
            document.getElementById('main-panel').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            if (mode === 'edit') {
                viewEls.forEach(id => document.getElementById(id).classList.add('hidden'));
                editEls.forEach(id => document.getElementById(id).classList.remove('hidden'));
                document.getElementById('edit-header').classList.remove('hidden');
                document.getElementById('trigger-edit-container').classList.add('hidden');
            } else if (mode === 'view') {
                editEls.forEach(id => document.getElementById(id).classList.add('hidden'));
                viewEls.forEach(id => document.getElementById(id).classList.remove('hidden'));
                document.getElementById('edit-header').classList.add('hidden');
                
                // Adminse "Düzenle" butonu çıksın
                if(window.isAdmin) {
                    document.getElementById('trigger-edit-container').classList.remove('hidden');
                } else {
                    document.getElementById('trigger-edit-container').classList.add('hidden');
                }
            }
        };

        // Kartvizit Listesini Çizme
        window.renderSidebar = () => {
            const listDiv = document.getElementById('sidebar-list');
            listDiv.innerHTML = '';

            if (window.saintsList.length === 0) {
                listDiv.innerHTML = `<div class="text-center p-6 border border-white/10 rounded-xl bg-white/5"><p class="text-white/60 text-sm">Henüz kayıt yok.</p></div>`;
                return;
            }

            window.saintsList.forEach(person => {
                // Kartvizit Tasarımı
                const card = document.createElement('div');
                card.className = 'saint-card relative aspect-[4/3] rounded-2xl overflow-hidden shadow-lg cursor-pointer transform transition-transform hover:scale-105 group bg-slate-800';
                
                // Kapak Resmi (Varsa ilk resim, yoksa yer tutucu)
                const coverUrl = (person.images && person.images.length > 0) ? person.images[0] : null;
                if (coverUrl) {
                    card.innerHTML = `<img src="${coverUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${person.name}">`;
                } else {
                    card.innerHTML = `<div class="w-full h-full flex items-center justify-center bg-primary/50 text-white/30"><svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>`;
                }

                // İsim Overlay
                const nameOverlay = document.createElement('div');
                nameOverlay.className = 'absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent p-4 pt-10';
                nameOverlay.innerHTML = `<h3 class="text-white font-bold text-center text-sm tracking-wide leading-tight">${person.name}</h3>`;
                card.appendChild(nameOverlay);

                // Tıklama Olayı (Görüntüleme Modu Açılır)
                card.onclick = () => showDetails(person);
                listDiv.appendChild(card);
            });
        };

        // Görüntüleme Modu
        window.showDetails = (person) => {
            window.currentEditingId = person.id;
            window.currentImages = person.images ? [...person.images] : [];
            
            // Verileri Oku ve Bas
            document.getElementById('view-name').innerText = person.name;
            document.getElementById('view-birth').innerText = person.birth || "?";
            document.getElementById('view-death').innerText = person.death || "?";
            document.getElementById('view-about').innerText = person.about || "Bilgi bulunmuyor.";
            
            const mapBtn = document.getElementById('view-map');
            if (person.mapLink) {
                mapBtn.href = person.mapLink;
                mapBtn.parentElement.classList.remove('hidden');
            } else {
                mapBtn.parentElement.classList.add('hidden');
            }

            renderGallery();
            setUIMode('view');
        };

        // Yeni Ekleme Formunu Aç (Admin)
        window.openNewEntryForm = () => {
            window.currentEditingId = null; // Yeni kayıt
            window.currentImages = [];
            
            // Formu Temizle
            document.getElementById('input-name').value = '';
            document.getElementById('input-birth').value = '';
            document.getElementById('input-death').value = '';
            document.getElementById('input-about').value = '';
            document.getElementById('input-map').value = '';
            
            renderGallery();
            setUIMode('edit');
            document.getElementById('input-name').focus();
        };

        // Düzenleme Moduna Geç (Admin)
        window.switchToEditMode = () => {
            if(!window.currentEditingId) return;
            const person = window.saintsList.find(p => p.id === window.currentEditingId);
            if(!person) return;

            document.getElementById('input-name').value = person.name || '';
            document.getElementById('input-birth').value = person.birth || '';
            document.getElementById('input-death').value = person.death || '';
            document.getElementById('input-about').value = person.about || '';
            document.getElementById('input-map').value = person.mapLink || '';
            
            window.currentImages = person.images ? [...person.images] : [];
            renderGallery();
            setUIMode('edit');
        };

        // Düzenlemeyi İptal Et
        window.cancelEdit = () => {
            if(window.currentEditingId) {
                // Var olanı görüntülüyordu, geri dön
                const person = window.saintsList.find(p => p.id === window.currentEditingId);
                showDetails(person);
            } else {
                // Yeni ekliyordu, boş ekrana dön
                document.getElementById('main-panel').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
            }
        };

        // Galeriyi Çiz (Hem View Hem Edit modu için aynı kutuyu kullanıyoruz, silme butonu yetkiye göre çıkıyor)
        window.renderGallery = () => {
            const container = document.getElementById('gallery-container');
            container.innerHTML = '';
            
            if(window.currentImages.length === 0) {
                container.innerHTML = `<div class="text-slate-400 text-sm italic py-4">Albümde resim yok.</div>`;
                return;
            }

            window.currentImages.forEach((imgBase64, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative flex-shrink-0 w-48 h-48 md:w-64 md:h-64 rounded-2xl overflow-hidden shadow-md group border border-slate-200';
                
                const img = document.createElement('img');
                img.src = imgBase64;
                img.className = 'w-full h-full object-cover';
                wrapper.appendChild(img);

                // Sadece düzenleme modunda silme butonu ekle
                if (!document.getElementById('edit-gallery-controls').classList.contains('hidden')) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg';
                    delBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
                    delBtn.onclick = () => {
                        window.currentImages.splice(index, 1);
                        renderGallery();
                    };
                    wrapper.appendChild(delBtn);
                }

                container.appendChild(wrapper);
            });
        };

        // Resim Yükleme ve Sıkıştırma (Çoklu Yükleme Desteği)
        window.handleGalleryUpload = async (event) => {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            showToast("Resimler işleniyor, lütfen bekleyin...", "warning");

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; // Firebase kotasını korumak için sıkıştırma
                            const MAX_HEIGHT = 800;
                            let width = img.width; let height = img.height;

                            if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
                            else if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }

                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            const base64 = canvas.toDataURL('image/jpeg', 0.6); // %60 kalite
                            window.currentImages.push(base64);
                            resolve();
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }
            
            // Input'u temizle (aynı dosyayı tekrar seçebilmek için)
            event.target.value = '';
            renderGallery();
            showToast("Resimler albüme eklendi (Henüz kaydedilmedi).");
        };

        // Formu Kaydet
        window.saveData = async () => {
            const name = document.getElementById('input-name').value.trim();
            const birth = document.getElementById('input-birth').value.trim();
            const death = document.getElementById('input-death').value.trim();
            const mapLink = document.getElementById('input-map').value.trim();
            const about = document.getElementById('input-about').value.trim();

            if (!name) {
                showToast("Lütfen mübareğin ismini giriniz!", 'error');
                document.getElementById('input-name').focus();
                return;
            }

            const personData = {
                name, birth, death, mapLink, about,
                images: window.currentImages,
                timestamp: Date.now()
            };

            if (isLocalMode) {
                if(window.currentEditingId) {
                    // Güncelle
                    const idx = window.saintsList.findIndex(p => p.id === window.currentEditingId);
                    if(idx > -1) window.saintsList[idx] = { id: window.currentEditingId, ...personData };
                } else {
                    // Ekle
                    const newId = Date.now().toString();
                    window.saintsList.push({ id: newId, ...personData });
                    window.currentEditingId = newId;
                }
                showToast("Masaüstü modunda başarıyla kaydedildi.");
                renderSidebar();
                showDetails({ id: window.currentEditingId, ...personData });
            } else {
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'saintsList');
                    if (window.currentEditingId) {
                        // Güncelle
                        const docRef = doc(colRef, window.currentEditingId);
                        await updateDoc(docRef, personData);
                        showToast("Kayıt başarıyla güncellendi!");
                    } else {
                        // Yeni Ekle
                        const newDocRef = await addDoc(colRef, personData);
                        window.currentEditingId = newDocRef.id;
                        showToast("Yeni kayıt veritabanına eklendi!");
                    }
                    
                    // İşlem bitince okuma moduna geç
                    personData.id = window.currentEditingId;
                    showDetails(personData);

                } catch (e) {
                    console.error(e);
                    if(e.code === 'resource-exhausted') {
                        showToast("Hata: Resimler çok büyük! Lütfen daha az resim yükleyin.", 'error');
                    } else {
                        showToast("Kayıt hatası!", 'error');
                    }
                }
            }
        };

        // Firebase Başlatma (Güvenli Bağlantı - Masaüstü Destekli)
        window.onload = async () => {
            const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            
            // Enter tuşu ile giriş
            document.getElementById('login-pw').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') checkLogin();
            });

            if (!firebaseConfigStr) {
                isLocalMode = true;
                showToast("Masaüstü Modu (Kayıtlar kalıcı değil)", 'warning');
                renderSidebar();
            } else {
                try {
                    const firebaseConfig = JSON.parse(firebaseConfigStr);
                    app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    
                    const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                    if (typeof __app_id !== 'undefined') appId = __app_id;

                    if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
                    else await signInAnonymously(auth);

                    // Verileri Dinle (Realtime List)
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'saintsList');
                    onSnapshot(colRef, (snapshot) => {
                        window.saintsList = [];
                        snapshot.forEach(doc => { window.saintsList.push({ id: doc.id, ...doc.data() }); });
                        
                        // Tarihe göre sırala (en yeniler üstte)
                        window.saintsList.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                        
                        renderSidebar();
                        
                        // Eğer şu an bir şey düzenlenmiyorsa ve listede eleman varsa, ilkini göster
                        if (!window.currentEditingId && window.saintsList.length > 0 && document.getElementById('main-panel').classList.contains('hidden')) {
                            showDetails(window.saintsList[0]);
                        }
                    });

                } catch (error) {
                    console.error("Firebase Hatası:", error);
                    isLocalMode = true;
                    showToast("Çevrimdışı moddasınız.", 'error');
                    renderSidebar();
                }
            }
        };
    </script>
</body>
</html>
